name: backend-ci

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: lingva
          POSTGRES_PASSWORD: lingva
          POSTGRES_DB: lingvauz_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U lingva -d lingvauz_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://lingva:lingva@localhost:5432/lingvauz_test?schema=public
      JWT_SECRET: ci-secret-thirty-two-characters-min
      JWT_EXPIRES_IN: 30d
      BCRYPT_ROUNDS: 4
      PORT: 3001
      NODE_ENV: test
      CORS_ORIGIN: http://localhost:5173

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run migrations
        run: npx prisma migrate deploy

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

      - name: Tests
        run: npm test --if-present
